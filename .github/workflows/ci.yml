name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: bun install

      - name: TypeScript check
        run: bunx tsc --noEmit

      - name: Vitest
        run: bun run test

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check --all-targets

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test

      - name: Build web
        run: bun run build
